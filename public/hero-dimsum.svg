<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sajian dimsum mentai premium dalam steamer bambu">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#FFE7A6"/>
      <stop offset="48%" stop-color="#F58B1F"/>
      <stop offset="100%" stop-color="#9E1510"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEFB8"/>
      <stop offset="50%" stop-color="#FFC531"/>
      <stop offset="100%" stop-color="#C98F00"/>
    </linearGradient>
    <linearGradient id="bamboo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7A85A"/>
      <stop offset="100%" stop-color="#A9642A"/>
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#F6C67C"/>
      <stop offset="100%" stop-color="#C07E38"/>
    </radialGradient>
    <radialGradient id="mentai" cx="40%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#FFE0A0"/>
      <stop offset="52%" stop-color="#F9A23F"/>
      <stop offset="100%" stop-color="#D7261E"/>
    </radialGradient>
    <radialGradient id="dough" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#EFD3A0"/>
    </radialGradient>
    <radialGradient id="sauce" cx="45%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F26B3A"/>
      <stop offset="100%" stop-color="#8E1108"/>
    </radialGradient>
  </defs>

  <!-- warm ambient glow -->
  <circle cx="300" cy="272" r="252" fill="url(#glow)" opacity="0.28"/>

  <!-- drop shadow under steamer -->
  <ellipse cx="300" cy="452" rx="210" ry="48" fill="#3A0B06" opacity="0.4"/>

  <!-- steamer front wall -->
  <path d="M96 300 h408 v70 a204 62 0 0 1 -408 0 Z" fill="url(#bamboo)"/>
  <!-- vertical slats -->
  <g stroke="#7A431B" stroke-width="2" opacity="0.55">
    <line x1="140" y1="308" x2="140" y2="392"/>
    <line x1="185" y1="312" x2="185" y2="404"/>
    <line x1="230" y1="314" x2="230" y2="412"/>
    <line x1="275" y1="315" x2="275" y2="416"/>
    <line x1="325" y1="315" x2="325" y2="416"/>
    <line x1="370" y1="314" x2="370" y2="412"/>
    <line x1="415" y1="312" x2="415" y2="404"/>
    <line x1="460" y1="308" x2="460" y2="392"/>
  </g>
  <!-- gold bands -->
  <path d="M96 306 a204 62 0 0 0 408 0" fill="none" stroke="url(#gold)" stroke-width="9"/>
  <path d="M110 360 a190 54 0 0 0 380 0" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.85"/>

  <!-- steamer top rim -->
  <ellipse cx="300" cy="300" rx="204" ry="62" fill="url(#rim)"/>
  <ellipse cx="300" cy="300" rx="204" ry="62" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <ellipse cx="300" cy="298" rx="176" ry="50" fill="#5A2A10"/>

  <!-- sauce dish (back) -->
  <ellipse cx="300" cy="258" rx="52" ry="20" fill="#2A0E07"/>
  <ellipse cx="300" cy="255" rx="44" ry="15" fill="url(#sauce)"/>
  <circle cx="288" cy="252" r="2.4" fill="#FFD98A" opacity="0.8"/>
  <circle cx="312" cy="257" r="2" fill="#FFD98A" opacity="0.7"/>

  <!-- back-left dumpling -->
  <g>
    <ellipse cx="228" cy="300" rx="58" ry="40" fill="url(#dough)"/>
    <path d="M175 300 q53 -66 106 0 q-53 34 -106 0 Z" fill="url(#mentai)"/>
    <ellipse cx="210" cy="286" rx="7" ry="4" fill="#8E1108" opacity="0.55"/>
    <ellipse cx="246" cy="292" rx="6" ry="3.5" fill="#8E1108" opacity="0.45"/>
    <path d="M195 316 q33 14 66 0" fill="none" stroke="#D9A860" stroke-width="3" opacity="0.7"/>
    <path d="M220 268 q4 -10 10 0" fill="none" stroke="#3E7D2C" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- back-right dumpling -->
  <g>
    <ellipse cx="372" cy="300" rx="58" ry="40" fill="url(#dough)"/>
    <path d="M319 300 q53 -66 106 0 q-53 34 -106 0 Z" fill="url(#mentai)"/>
    <ellipse cx="356" cy="286" rx="7" ry="4" fill="#8E1108" opacity="0.55"/>
    <ellipse cx="392" cy="293" rx="6" ry="3.5" fill="#8E1108" opacity="0.45"/>
    <path d="M339 316 q33 14 66 0" fill="none" stroke="#D9A860" stroke-width="3" opacity="0.7"/>
    <path d="M366 268 q4 -10 10 0" fill="none" stroke="#3E7D2C" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- front-center dumpling (hero piece) -->
  <g>
    <ellipse cx="300" cy="322" rx="72" ry="50" fill="url(#dough)"/>
    <path d="M234 322 q66 -82 132 0 q-66 42 -132 0 Z" fill="url(#mentai)"/>
    <ellipse cx="278" cy="304" rx="9" ry="5" fill="#8E1108" opacity="0.55"/>
    <ellipse cx="322" cy="310" rx="8" ry="4.5" fill="#8E1108" opacity="0.5"/>
    <ellipse cx="300" cy="298" rx="6" ry="3.5" fill="#FFE7A6" opacity="0.7"/>
    <path d="M252 344 q48 18 96 0" fill="none" stroke="#D9A860" stroke-width="4" opacity="0.75"/>
    <path d="M270 356 q30 12 60 0" fill="none" stroke="#D9A860" stroke-width="3" opacity="0.55"/>
    <path d="M294 282 q6 -12 12 0" fill="none" stroke="#3E7D2C" stroke-width="5" stroke-linecap="round"/>
    <circle cx="315" cy="292" r="2" fill="#3E7D2C"/>
    <circle cx="285" cy="294" r="1.8" fill="#F7F0DA"/>
    <circle cx="330" cy="300" r="1.8" fill="#F7F0DA"/>
  </g>

  <!-- chopsticks -->
  <g stroke-linecap="round">
    <line x1="404" y1="150" x2="512" y2="322" stroke="#6E3A17" stroke-width="9"/>
    <line x1="404" y1="150" x2="512" y2="322" stroke="url(#gold)" stroke-width="3.5"/>
    <line x1="430" y1="146" x2="536" y2="316" stroke="#6E3A17" stroke-width="9"/>
    <line x1="430" y1="146" x2="536" y2="316" stroke="url(#gold)" stroke-width="3.5"/>
  </g>

  <!-- chili garnish -->
  <path d="M150 356 q40 8 74 34" fill="none" stroke="#C21A12" stroke-width="10" stroke-linecap="round"/>
  <path d="M150 356 q-6 -12 -18 -14" fill="none" stroke="#3E7D2C" stroke-width="7" stroke-linecap="round"/>

  <!-- sesame scatter -->
  <g fill="#FBEFC9">
    <ellipse cx="188" cy="330" rx="3" ry="1.6" transform="rotate(20 188 330)"/>
    <ellipse cx="420" cy="336" rx="3" ry="1.6" transform="rotate(-15 420 336)"/>
    <ellipse cx="330" cy="360" rx="3" ry="1.6" transform="rotate(30 330 360)"/>
  </g>
</svg>
